<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - PakLaw AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="main-content flex justify-between items-center" style="justify-content: center; padding: 3rem 1rem; flex-direction: column; gap: 1.5rem; min-height: calc(100vh - 100px);">
      <a href="index.html" style="font-size: 1.75rem; font-weight: 700; text-decoration: none; color: var(--text-primary); letter-spacing: -0.03em;">⚖ PakLaw AI</a>
      <div class="card container-narrow">
        <h1 class="card-title text-center" id="cardTitle">Reset Password</h1>
        <p class="card-subtitle text-center" id="cardSubtitle">Step 1 of 2: Verify your email address</p>

        <!-- Step 1: Enter Email & Verification Code -->
        <form id="step1Form" onsubmit="goToStep2(event)" class="flex flex-col gap-4">
          <div class="form-group">
            <label for="resetEmail" class="form-label">Email address</label>
            <div class="flex gap-2">
              <input type="email" id="resetEmail" class="form-input" placeholder="name@domain.com" required style="flex: 1;">
              <button type="button" id="sendCodeBtn" onclick="sendResetCode(event)" class="btn btn-secondary" style="white-space: nowrap;">Send Code</button>
            </div>
          </div>

          <div id="codeSection" class="form-group" style="border-top: 1px solid var(--border-light); padding-top: 1.25rem; margin-top: 0.5rem;">
            <label for="resetCode" class="form-label">6-Digit Verification Code</label>
            <input type="text" id="resetCode" class="form-input text-center" placeholder="123456" pattern="\d{6}" maxlength="6" required style="font-size: 1.25rem; letter-spacing: 0.25em;">
            <p id="codeSentMsg" style="font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-top: 0.5rem;"></p>
            <button type="submit" class="btn btn-primary btn-full mt-4">Verify Code</button>
          </div>
        </form>

        <!-- Step 2: Enter New Password -->
        <form id="step2Form" onsubmit="handlePasswordReset(event)" class="flex flex-col gap-4" style="display: none;">
          <div class="form-group">
            <label for="resetNewPassword" class="form-label">New Password</label>
            <input type="password" id="resetNewPassword" class="form-input" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="resetConfirmPassword" class="form-label">Confirm New Password</label>
            <input type="password" id="resetConfirmPassword" class="form-input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full mt-4">Update Password</button>
        </form>
        
        <p class="text-center mt-6" style="font-size: 0.875rem;">
          <a href="login.html" style="color: var(--text-secondary); text-decoration: none;">Return to Sign In</a>
        </p>
      </div>
    </main>

    <footer class="footer">
      <div>© 2026 PakLaw AI · Minimal Legal Prototype</div>
    </footer>
  </div>

  <script>
    // Navigation state variables
    const titleEl = document.getElementById('cardTitle');
    const subtitleEl = document.getElementById('cardSubtitle');
    const step1 = document.getElementById('step1Form');
    const step2 = document.getElementById('step2Form');

    function sendResetCode(e) {
      if (e) e.preventDefault();
      const emailInput = document.getElementById('resetEmail');
      if (!emailInput.reportValidity()) {
        return;
      }
      
      const emailVal = emailInput.value;
      const codeSentMsg = document.getElementById('codeSentMsg');
      const sendCodeBtn = document.getElementById('sendCodeBtn');
      
      codeSentMsg.innerHTML = `We sent a verification code to <span style="font-weight: 600; color: var(--text-primary);">${emailVal}</span>`;
      sendCodeBtn.textContent = 'Resend Code';
    }

    function goToStep2(e) {
      e.preventDefault();
      step1.style.display = 'none';
      step2.style.display = 'flex';
      titleEl.textContent = 'New Password';
      subtitleEl.textContent = 'Step 2 of 2: Enter and confirm your new password';
    }

    function handlePasswordReset(e) {
      e.preventDefault();
      const newPwd = document.getElementById('resetNewPassword').value;
      const confirmPwd = document.getElementById('resetConfirmPassword').value;

      if (newPwd !== confirmPwd) {
        alert('Passwords do not match.');
        return;
      }

      alert('Password reset successful!');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>

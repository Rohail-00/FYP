<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inconsistency Check - PakLaw AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <nav class="nav-bar">
      <a href="index.html" class="nav-brand">⚖ PakLaw AI</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li id="authLink"><a href="login.html" class="nav-btn nav-btn-secondary">Sign In</a></li>
        <li id="joinLink"><a href="signup.html" class="nav-btn nav-btn-primary">Join</a></li>
        <li id="changePasswordLink" style="display: none;"><a href="change-password.html">Change Password</a></li>
        <li id="signOutLink" style="display: none;"><a href="#" onclick="handleSignOut(event)" class="nav-btn nav-btn-secondary">Sign Out</a></li>
      </ul>
    </nav>

    <main class="main-content">
      <div class="container container-narrow" style="padding-top: 3rem; padding-bottom: 3rem;">
        <div class="mb-6">
          <h1 style="font-size: 1.75rem; font-weight: 700; tracking: -0.02em; margin-bottom: 0.25rem;">Consistency Audit</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">Input draft clauses to check against existing federal statutes.</p>
        </div>

        <form id="checkForm" onsubmit="handleAnalyze(event)" class="card flex flex-col gap-6">
          
          <div class="form-group">
            <div class="flex justify-between items-center mb-2" style="flex-wrap: wrap; gap: 0.5rem;">
              <label for="draftText" class="form-label" style="font-weight: 600; margin-bottom: 0;">Draft Clause Text</label>
              <button type="button" id="voiceTypeBtn" onclick="toggleVoiceTyping()" class="btn btn-secondary" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.35rem; border-radius: var(--radius-md); height: auto;">
                <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition: var(--transition);">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
                <span id="voiceStatusText">Voice Type</span>
              </button>
            </div>
            <textarea id="draftText" class="form-input form-textarea" placeholder="Paste the text of the proposed statutory amendment or clause here..." required></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" style="font-weight: 600;">Or Upload Document File</label>
            <div class="upload-dropzone" id="dropzone" onclick="triggerFileInput()">
              <div class="upload-icon">📂</div>
              <div style="font-size: 0.85rem; font-weight: 500; color: var(--text-primary);">Click to select files or drag them here</div>
              <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">PDF, DOCX, or TXT up to 10MB</div>
              <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
            </div>
            <div id="fileFeedback" style="display: none; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); font-weight: 500;">
              Selected file: <span id="fileName" style="color: var(--text-primary); font-weight: 600;"></span>
            </div>
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-full mt-2">
            Analyze for Inconsistencies
          </button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <div>© 2026 PakLaw AI · Minimal Legal Prototype</div>
    </footer>
  </div>

  <script>
    // Mobile navigation toggle
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.getElementById('navMenu');
    if (navToggle && navMenu) {
      navToggle.addEventListener('click', () => {
        navMenu.classList.toggle('show');
      });
    }

    // Handle mock auth state for nav bar
    const email = localStorage.getItem('pak_email');
    const token = localStorage.getItem('pak_token');
    if (email && token) {
      const authLink = document.getElementById('authLink');
      const joinLink = document.getElementById('joinLink');
      const signOutLink = document.getElementById('signOutLink');
      const changePasswordLink = document.getElementById('changePasswordLink');
      if (authLink) authLink.style.display = 'none';
      if (joinLink) joinLink.style.display = 'none';
      if (signOutLink) signOutLink.style.display = 'block';
      if (changePasswordLink) changePasswordLink.style.display = 'block';
    }

    function handleSignOut(e) {
      if (e) e.preventDefault();
      localStorage.removeItem('pak_email');
      localStorage.removeItem('pak_token');
      window.location.reload();
    }

    // Trigger local file explorer selection
    function triggerFileInput() {
      document.getElementById('fileInput').click();
    }

    // Handle selected files
    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileFeedback').style.display = 'block';
      }
    }

    // Handle form submit analysis
    function handleAnalyze(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.textContent = 'Running Neural-Symbolic Check...';
      submitBtn.disabled = true;

      // Mock analysis delay
      setTimeout(() => {
        window.location.href = 'report.html';
      }, 1500);
    }

    // Mock Voice Typing toggle logic (Aesthetic only, no microphone access required)
    let isListening = false;
    let mockSpeechInterval = null;

    function toggleVoiceTyping() {
      const voiceBtn = document.getElementById('voiceTypeBtn');
      const statusText = document.getElementById('voiceStatusText');
      const textarea = document.getElementById('draftText');
      
      const mockPhrases = [
        "In accordance with federal regulations,",
        " the amendment proposed in Section 12",
        " shall be audited for constitutional alignment",
        " with all active statutes."
      ];
      let phraseIndex = 0;

      if (!isListening) {
        // Turn ON listening state
        isListening = true;
        voiceBtn.classList.remove('btn-secondary');
        voiceBtn.classList.add('btn-primary');
        voiceBtn.style.backgroundColor = '#ef4444';
        voiceBtn.style.borderColor = '#ef4444';
        voiceBtn.style.color = '#ffffff';
        statusText.textContent = 'Listening...';

        // Simulate voice-to-text input typing into the textarea
        mockSpeechInterval = setInterval(() => {
          if (phraseIndex < mockPhrases.length) {
            if (textarea.value && !textarea.value.endsWith(' ')) {
              textarea.value += ' ';
            }
            textarea.value += mockPhrases[phraseIndex];
            phraseIndex++;
          } else {
            // Reached end of mock script, stop automatically
            stopListening();
          }
        }, 1200);

      } else {
        // Turn OFF listening state
        stopListening();
      }

      function stopListening() {
        isListening = false;
        clearInterval(mockSpeechInterval);
        voiceBtn.classList.add('btn-secondary');
        voiceBtn.classList.remove('btn-primary');
        voiceBtn.style.backgroundColor = '';
        voiceBtn.style.borderColor = '';
        voiceBtn.style.color = '';
        statusText.textContent = 'Voice Type';
      }
    }
  </script>
</body>
</html>

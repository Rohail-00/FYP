<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - PakLaw AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <main class="main-content flex justify-between items-center" style="justify-content: center; padding: 3rem 1rem; flex-direction: column; gap: 1.5rem; min-height: calc(100vh - 100px);">
      <a href="index.html" style="font-size: 1.75rem; font-weight: 700; text-decoration: none; color: var(--text-primary); letter-spacing: -0.03em;">⚖ PakLaw AI</a>
      <div class="card container-narrow">
        <h1 class="card-title text-center">Change Password</h1>
        <p class="card-subtitle text-center">Update your security credentials</p>
        
        <form id="changePasswordForm" onsubmit="handleChangePassword(event)" class="flex flex-col gap-4">
          <div class="form-group">
            <label for="currentPassword" class="form-label">Current password</label>
            <input type="password" id="currentPassword" class="form-input" placeholder="••••••••" required>
          </div>

          <div class="form-group">
            <label for="newPassword" class="form-label">New password</label>
            <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required>
          </div>

          <div class="form-group">
            <label for="confirmNewPassword" class="form-label">Confirm new password</label>
            <input type="password" id="confirmNewPassword" class="form-input" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full mt-4">Update Password</button>
        </form>
        
        <p class="text-center mt-6" style="font-size: 0.875rem;">
          <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">Cancel and return Home</a>
        </p>
      </div>
    </main>

    <footer class="footer">
      <div>© 2026 PakLaw AI · Minimal Legal Prototype</div>
    </footer>
  </div>

  <script>
    // Password check logic

    function handleChangePassword(e) {
      e.preventDefault();
      const current = document.getElementById('currentPassword').value;
      const newPwd = document.getElementById('newPassword').value;
      const confirmNew = document.getElementById('confirmNewPassword').value;

      if (newPwd !== confirmNew) {
        alert('New passwords do not match.');
        return;
      }

      alert('Password updated successfully!');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
